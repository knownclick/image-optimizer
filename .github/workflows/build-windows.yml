name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build-type: [folder, onefile]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          pip install -e .

      - name: Build executable (folder)
        if: matrix.build-type == 'folder'
        run: pyinstaller --clean --noconfirm mediamanager.spec

      - name: Build executable (onefile)
        if: matrix.build-type == 'onefile'
        run: pyinstaller --clean --noconfirm mediamanager_onefile.spec

      - name: Test executable starts
        shell: cmd
        run: |
          if "${{ matrix.build-type }}" == "onefile" (
            dist\MediaManager.exe --version
          ) else (
            dist\MediaManager\MediaManager.exe --version
          )

      - name: Create ZIP (folder build)
        if: matrix.build-type == 'folder'
        run: Compress-Archive -Path dist\MediaManager -DestinationPath MediaManager-windows-folder.zip
        shell: pwsh

      - name: Upload artifact (folder)
        if: matrix.build-type == 'folder'
        uses: actions/upload-artifact@v4
        with:
          name: MediaManager-windows-folder
          path: MediaManager-windows-folder.zip

      - name: Upload artifact (onefile)
        if: matrix.build-type == 'onefile'
        uses: actions/upload-artifact@v4
        with:
          name: MediaManager-windows-onefile
          path: dist/MediaManager.exe
